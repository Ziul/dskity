name: DSKity

# Auto-reload: null = smart default (enabled outside production)
# Override via --reload / --no-reload or DSKITY_RELOAD env var.
reload: null

modules_search_paths:
  - dskity.modules
  - modules
  - examples.modules

common:
  admin:
    enabled: true
    show_config: true
  logging:
    level: "ERROR"
  mqtt:
    enabled: false
    broker: "mqtts://localhost"
    port: 1883
    client_id: "dskity"
    # User (opcional)
    username: null
    # Password (opcional)
    password: null
    # Keep alive (seconds)
    keepalive: 60
    # Reconnect interval (seconds)
    reconnect_interval_seconds: 10
    # Protocol (3.1, 3.1.1, 5.0)
    protocol: "5.0"
    tls_secure: true
    tls_version: "tlsv1_2"
    # Adicional subscribe topics (opcional)
    subscribe_topics: []

modules:
  health:
    enabled: true
  external:
    enabled: false
    url: "https://my-dns/external-module"