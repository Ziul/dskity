name: Building

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      version:
        description: version created on this build
        value: ${{ jobs.versioning.outputs.MajorMinorPatch }}
      EscapedBranchName:
        description: Escaped branch name
        value: ${{ jobs.versioning.outputs.EscapedBranchName }}

permissions:
  contents: read
  packages: write

jobs:
  versioning:
    uses: ./.github/workflows/version.yaml
    with:
      runner: ubuntu-latest
  test:
    uses: ./.github/workflows/tests.yaml
  build:
    name: Building
    strategy:
      matrix:
        python_version:
          - 3.12
    runs-on: ubuntu-latest
    needs: [versioning, test]
    if: github.event_name == 'release' || endsWith(github.ref, github.event.repository.default_branch)
    steps:
      - name: Set repository owner lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ghcr.io/${{ steps.repo_owner.outputs.owner }}/${{ github.event.repository.name }}:latest,ghcr.io/${{ steps.repo_owner.outputs.owner }}/${{ github.event.repository.name }}:${{ needs.versioning.outputs.EscapedBranchName }},ghcr.io/${{ steps.repo_owner.outputs.owner }}/${{ github.event.repository.name }}:${{ needs.versioning.outputs.MajorMinorPatch }}
          push: true
          load: true
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}